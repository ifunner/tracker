<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1113" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#eef0f1" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
  <div id="app">
    <div id="boot" class="boot">
      <div class="splash-mark">
        <svg viewBox="0 0 64 132" aria-hidden="true">
          <rect class="rail" x="29" y="4" width="6" height="124" rx="3"/>
          <circle class="rail" cx="32" cy="6" r="5.5"/>
          <circle class="rail" cx="32" cy="126" r="5.5"/>
          <circle class="ring" cx="32" cy="62" r="30"/>
          <circle class="ring2" cx="32" cy="62" r="23"/>
          <circle class="glow" cx="32" cy="62" r="18"/>
          <circle class="live" cx="32" cy="62" r="13"/>
        </svg>
      </div>
      <div class="splash-name">Tracker</div>
      <div class="splash-tag">Always on track.</div>
      <div class="splash-foot">GO Transit schedules · offline ready</div>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
